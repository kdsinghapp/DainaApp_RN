buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
        // Provide the react-native directory explicitly so react-native-gesture-handler
        // doesn't need to spawn a `node` process to find it (nvm node isn't on Gradle's PATH).
        REACT_NATIVE_NODE_MODULES_DIR = file("../node_modules/react-native")
    }
    repositories {
        google()
        mavenCentral() 
    }
    dependencies {
        
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath 'com.google.gms:google-services:4.4.3'

    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects {
    def apply16KBFixes = {
        it.defaultConfig {
            externalNativeBuild {
                cmake {
                    arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,common-page-size=16384 -Wl,-z,max-page-size=16384"
                }
                ndkBuild {
                    arguments "APP_LDFLAGS+=-Wl,-z,common-page-size=16384 -Wl,-z,max-page-size=16384"
                }
            }
        }
    }

    pluginManager.withPlugin('com.android.application') {
        apply16KBFixes(android)
    }
    pluginManager.withPlugin('com.android.library') {
        apply16KBFixes(android)
    }
}
